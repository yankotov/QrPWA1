<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMT Anti-Mixing Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f14;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1 { font-size:18px; opacity:0.9; }

.card {
  width:100%;
  max-width:420px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:16px;
  padding:14px;
}

#result {
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#0f172a;
  border:1px solid #1e293b;
  min-height:40px;
}

.status {
  margin-top:10px;
  font-weight:bold;
}

.ok { color:#22c55e; }
.err { color:#ef4444; }
.warn { color:#f59e0b; }

</style>
</head>

<body>

<h1>SMT Anti-Mixing Scanner</h1>

<div class="card">
  <div id="reader"></div>

  <div id="result">Очікування скану...</div>
  <div id="status" class="status"></div>
</div>

<script>
/**
 * MOCK DATABASE (потім замінимо на FastAPI)
 */
const activeFeederMap = {
  "F1": "RES-0402-10K-1%",
  "F2": "CAP-0402-100nF",
}

/**
 * простий парсер QR
 */
function parseQR(text) {
  return text.trim().toUpperCase()
}

/**
 * перевірка анти-міксу
 */
function checkComponent(qr) {
  for (const feeder in activeFeederMap) {
    if (activeFeederMap[feeder] === qr) {
      return { status: "OK", msg: `Вже використовується в ${feeder}` }
    }

    if (feeder === "F1" && qr.startsWith("RES")) {
      return { status: "WARN", msg: "Схожий тип резисторів" }
    }
  }

  return { status: "ERR", msg: "Невідомий або конфліктний компонент!" }
}

function render(result) {
  const el = document.getElementById("result")
  const st = document.getElementById("status")

  el.innerText = result.msg

  st.className = "status"

  if (result.status === "OK") {
    st.classList.add("ok")
    st.innerText = "✔ OK"
  }

  if (result.status === "ERR") {
    st.classList.add("err")
    st.innerText = "✖ BLOCKED"
  }

  if (result.status === "WARN") {
    st.classList.add("warn")
    st.innerText = "⚠ WARNING"
  }
}

function onScanSuccess(decodedText) {
  const qr = parseQR(decodedText)

  document.getElementById("result").innerText = qr

  const res = checkComponent(qr)
  render(res)
}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
})

scanner.render(onScanSuccess)
</script>

</body>
</html>
