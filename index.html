<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMT Compare Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f14;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.card {
  width:100%;
  max-width:420px;
  background:#111827;
  border-radius:16px;
  border:1px solid #1f2937;
  padding:14px;
}

#reader {
  width: 260px;
  height: 260px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
}

.box {
  margin-top:12px;
  padding:12px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:12px;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#scanBtn {
  background:#22c55e;
  color:black;
}

#resetBtn {
  background:#2563eb;
  color:white;
}

.status {
  margin-top:10px;
  font-weight:bold;
}

.ok { color:#22c55e; }
.err { color:#ef4444; }
.info { color:#38bdf8; }
</style>
</head>

<body>

<h2>SMT Reel Compare</h2>

<div class="card">

  <div id="reader"></div>

  <div class="box">
    <div>1️⃣ Котушка A:</div>
    <div id="coil1">—</div>
  </div>

  <div class="box">
    <div>2️⃣ Котушка B:</div>
    <div id="coil2">—</div>
  </div>

  <button id="scanBtn">📷 Scan</button>
  <button id="resetBtn">🔄 Reset</button>

  <div id="status" class="status info">Наведи на котушку і натисни Scan</div>

</div>

<script>
let scanner
let lastScan = null
let step = 1

let coilA = null
let coilB = null

function setStatus(text, type="info") {
  const el = document.getElementById("status")
  el.className = "status " + type
  el.innerText = text
}

function reset() {
  step = 1
  coilA = null
  coilB = null
  lastScan = null

  document.getElementById("coil1").innerText = "—"
  document.getElementById("coil2").innerText = "—"

  setStatus("Наведи на котушку і натисни Scan", "info")
}

document.getElementById("resetBtn").onclick = reset

function startScanner() {
  scanner = new Html5Qrcode("reader")

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      lastScan = decodedText.trim().toUpperCase()
    }
  )
}

document.getElementById("scanBtn").onclick = async () => {
  if (!lastScan) {
    setStatus("Немає QR в кадрі", "err")
    return
  }

  const qr = lastScan

  if (step === 1) {
    coilA = qr
    document.getElementById("coil1").innerText = qr
    step = 2
    setStatus("Тепер наведи на другу котушку", "info")
  } else if (step === 2) {
    coilB = qr
    document.getElementById("coil2").innerText = qr

    if (coilA === coilB) {
      setStatus("✔ OK — котушки однакові", "ok")
    } else {
      setStatus("✖ ERROR — МІКСИНГ!", "err")
    }

    step = 3
  }
}

startScanner()
</script>

</body>
</html>
