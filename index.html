<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMT Compare Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f14;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.card {
  width:100%;
  max-width:420px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:16px;
  padding:14px;
}

#reader {
  border-radius:12px;
  overflow:hidden;
}

.box {
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#0f172a;
  border:1px solid #1e293b;
  min-height:40px;
}

.btn {
  margin-top:10px;
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.btn:disabled {
  background:#334155;
}

.status {
  margin-top:10px;
  font-weight:bold;
}

.ok { color:#22c55e; }
.err { color:#ef4444; }
.info { color:#38bdf8; }
</style>
</head>

<body>

<h2>SMT Coil Compare</h2>

<div class="card">
  <div id="reader"></div>

  <div class="box">
    <div>1️⃣ Перша котушка:</div>
    <div id="coil1">—</div>
  </div>

  <div class="box">
    <div>2️⃣ Друга котушка:</div>
    <div id="coil2">—</div>
  </div>

  <button class="btn" id="resetBtn">Скинути</button>

  <div id="status" class="status info">Скануй першу котушку</div>
</div>

<script>
let step = 1
let coilA = null
let coilB = null

function setStatus(text, type="info") {
  const el = document.getElementById("status")
  el.className = "status " + type
  el.innerText = text
}

function reset() {
  step = 1
  coilA = null
  coilB = null

  document.getElementById("coil1").innerText = "—"
  document.getElementById("coil2").innerText = "—"
  setStatus("Скануй першу котушку", "info")
}

document.getElementById("resetBtn").onclick = reset

function onScanSuccess(decodedText) {
  const qr = decodedText.trim().toUpperCase()

  // STEP 1
  if (step === 1) {
    coilA = qr
    document.getElementById("coil1").innerText = qr
    step = 2
    setStatus("Підтверди та скануй другу котушку", "info")
    return
  }

  // STEP 2
  if (step === 2) {
    coilB = qr
    document.getElementById("coil2").innerText = qr

    // COMPARE
    if (coilA === coilB) {
      setStatus("✔ OK — котушки однакові", "ok")
    } else {
      setStatus("✖ ERROR — МІКСИНГ! різні котушки", "err")
    }

    step = 3
  }
}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
})

scanner.render(onScanSuccess)
</script>

</body>
</html>
