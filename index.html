<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
      border-radius: 16px;
      overflow: hidden;
    }

    #result {
      margin-top: 20px;
      padding: 16px;
      background: #222;
      border-radius: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h1>QR Scanner</h1>

  <div id="reader"></div>

  <div id="result">
    Очікування QR...
  </div>

  <script>
    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = decodedText
    }

    const scanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: 250
      }
    )

    scanner.render(onScanSuccess)
  </script>

</body>
</html>
